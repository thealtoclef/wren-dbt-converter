db:
  type: postgres      # postgres | mysql | mariadb | sqlite | duckdb | doris
  host: localhost
  port: 5432
  dbname: mydb
  user: alice
  password: secret

serve:
  host: 0.0.0.0
  port: 8080

# Optional — remove this block to use live enrichment defaults (budget: 20)
enrichment:
  budget: 20                        # max live DB queries per describe_table call
  distinct_values_limit: 50         # max values returned in a distinct summary
  distinct_values_max_cardinality: 500  # skip distinct query if cardinality exceeds this

# Optional — remove this block if you don't use OpenTelemetry
monitoring:
  log_level: info
  service_name: dbt-graphql
  exporter: otlp          # otlp | console
  endpoint: http://localhost:4317
  protocol: grpc          # grpc | http
